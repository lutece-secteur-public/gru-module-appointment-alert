# {plugin.pluginName} properties file

#######################################################################################################
# Default Labels for XPage
genericalert.pageTitle=module appointment alert
genericalert.pagePathLabel=module appointment alert

#Appointment reminder daemon
daemon.AppointmentReminderDaemon.interval=600
daemon.AppointmentReminderDaemon.onstartup=1


#interval deamon

daemon.reminder.interval = 10
#default maxlength sms textarea 
genericalert.maxLength.textSms=120

genericalert.senderSms=
genericalert.prefixSenderSms=

# TaskType NotifyReminder configuration
genericalert.taskTypeNotifyReminder.key=taskNotifyReminder
genericalert.taskTypeNotifyReminder.titleI18nKey=genericalert.task_notify_reminder.title
genericalert.taskTypeNotifyReminder.beanName=genericalert.taskNotifyReminder
genericalert.taskTypeNotifyReminder.configBeanName=genericalert.notifyReminderTaskComponent
genericalert.taskTypeNotifyReminder.configRequired=true
genericalert.taskTypeNotifyReminder.formTaskRequired=false
genericalert.taskTypeNotifyReminder.taskForAutomaticAction=true
  


